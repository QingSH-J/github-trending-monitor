spring:
  application:
    name: github-trending-monitor

  datasource:
    url: ${DATABASE_URL:jdbc:mysql://localhost:3306/github_trending?connectionTimeZone=UTC&allowPublicKeyRetrieval=true}
    username: ${DATABASE_USERNAME:root}
    password: ${DATABASE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID:dev-github-client-id}
            client-secret: ${GITHUB_CLIENT_SECRET:dev-github-client-secret}
            scope: user:email,read:user

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:dev-only-change-this-jwt-secret-must-be-at-least-256-bits-long}
    expiration-ms: ${JWT_EXPIRATION_MS:604800000}
  oauth2:
    redirect-url: ${FRONTEND_OAUTH_REDIRECT_URL:http://localhost:5173/oauth/callback}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:dev-placeholder}
  mail:
    provider: resend
    resend-api-key: ${RESEND_API_KEY:}
    from: ${MAIL_FROM:noreply@qingshiyuu.com}
    from-name: ${MAIL_FROM_NAME:Repo Radar}
